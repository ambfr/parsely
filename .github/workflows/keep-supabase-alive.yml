name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://ldpzebatkfivrifosapq.supabase.co/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"